<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Booking - Singam Kings Inn</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">Singam Kings Inn</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#rooms">Rooms</a>
    <a href="index.html#about">About</a>
    <a href="bookings.html">Bookings</a>
    <a href="index.html#contact">Contact</a>
  </nav>
</header>

<section class="booking">
  <h2>Booking</h2>

  <form id="bookingForm"
        action="https://formsubmit.co/singamkingsinn@gmail.com"
        method="POST">

    <!-- BASIC DETAILS -->
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
      <label>Contact Number</label>
      <input type="tel" id="phone" name="phone"
             pattern="[0-9]{10}" required>
    </div>

<!-- CHECKIN ROW -->
<div class="row">
  <div>
    <label>Checkin Date</label>
    <input type="date" id="checkinDate" name="checkinDate" required>
  </div>

  <div>
    <label>Checkin Time</label>
    <input type="number" id="checkinHour" name="checkinHour"
           min="1" max="12" placeholder="HH" required>
  </div>

  <div>
    <label>AM/PM</label>
    <select id="checkinPeriod" name="checkinPeriod" required>
      <option>AM</option>
      <option>PM</option>
    </select>
  </div>
</div>

<!-- CHECKOUT ROW -->
<div class="row">
  <div>
    <label>Checkout Date</label>
    <input type="date" id="checkoutDate" name="checkoutDate" required>
  </div>

  <div>
    <label>Checkout Time</label>
    <input type="number" id="checkoutHour" name="checkoutHour"
           min="1" max="12" placeholder="HH" required>
  </div>

  <div>
    <label>AM/PM</label>
    <select id="checkoutPeriod" name="checkoutPeriod" required>
      <option>AM</option>
      <option>PM</option>
    </select>
  </div>
</div>

    <input type="hidden" name="_subject" id="emailSubject">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_next"
           value="https://knagarjuna47.github.io/SingamKingsinn/thankyou.html">

    <button type="submit">Book Now</button>
  </form>
</section>

<footer>
  <p>© 2024 Singam Kings Inn Hotel. All Rights Reserved.</p>
</footer>

<script>
document.getElementById("bookingForm").addEventListener("submit", function() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;

  let checkinDate = document.getElementById("checkinDate").value;
  let checkinHour = document.getElementById("checkinHour").value;
  let checkinPeriod = document.getElementById("checkinPeriod").value;

  let checkoutDate = document.getElementById("checkoutDate").value;
  let checkoutHour = document.getElementById("checkoutHour").value;
  let checkoutPeriod = document.getElementById("checkoutPeriod").value;

  let checkinFull = checkinDate + " " + checkinHour + ":00 " + checkinPeriod;
  let checkoutFull = checkoutDate + " " + checkoutHour + ":00 " + checkoutPeriod;

  document.getElementById("emailSubject").value =
      "Booking enquiry - " + name + " from " + checkinFull;

  let adminMessage = `New Booking Request:%0A
Name: ${name}%0A
Email: ${email}%0A
Phone: ${phone}%0A
Check-in: ${checkinFull}%0A
Check-out: ${checkoutFull}`;

  let adminNumber = "919550333582";

  window.open(`https://wa.me/${adminNumber}?text=${adminMessage}`, "_blank");

});
</script>
  
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Booking - Singam Kings Inn</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">Singam Kings Inn</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#rooms">Rooms</a>
    <a href="index.html#about">About</a>
    <a href="bookings.html">Bookings</a>
    <a href="index.html#contact">Contact</a>
  </nav>
</header>

<section class="booking">
  <h2>Book Your Stay</h2>

  <form id="bookingForm"
        action="https://formsubmit.co/singamkingsinn@gmail.com"
        method="POST">

    <input type="text" id="name" name="name" placeholder="Full Name" required>

    <input type="email" id="email" name="email" placeholder="Email" required>

    <input type="tel" id="phone" name="phone"
           placeholder="Contact Number"
           pattern="[0-9]{10}"
           title="Enter 10 digit mobile number"
           required>

    <!-- CHECK-IN DATE & TIME -->
    <label>Check-in Date & Time</label>
    <input type="datetime-local" id="checkin" name="checkin" required>

    <!-- CHECK-OUT DATE & TIME -->
    <label>Check-out Date & Time</label>
    <input type="datetime-local" id="checkout" name="checkout" required>

    <select id="room" name="room" required>
      <option value="">Select Room Type</option>
      <option>AC Room</option>
      <option>Non AC Room</option>
    </select>

    <!-- Dynamic Email Subject -->
    <input type="hidden" name="_subject" id="emailSubject">

    <input type="hidden" name="_captcha" value="false">

    <input type="hidden" name="_next"
           value="https://knagarjuna47.github.io/SingamKingsinn/thankyou.html">

    <button type="submit">Book Now</button>
  </form>
</section>

<footer>
  <p>© 2024 Singam Kings Inn Hotel. All Rights Reserved.</p>
</footer>

<script>
document.getElementById("bookingForm").addEventListener("submit", function() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let checkin = document.getElementById("checkin").value;
  let checkout = document.getElementById("checkout").value;
  let room = document.getElementById("room").value;

  // Format date-time nicely
  let checkinFormatted = new Date(checkin).toLocaleString();
  let checkoutFormatted = new Date(checkout).toLocaleString();

  // Set email subject
  document.getElementById("emailSubject").value =
      "Booking enquiry - " + name + " from " + checkinFormatted;

  // WhatsApp Message
  let message = `New Booking Request:%0A
Name: ${name}%0A
Email: ${email}%0A
Phone: ${phone}%0A
Check-in: ${checkinFormatted}%0A
Check-out: ${checkoutFormatted}%0A
Room Type: ${room}`;

  let phoneNumber = "919550333582";

  window.open(`https://wa.me/${phoneNumber}?text=${message}`, "_blank");

});
</script>

</body>
</html>

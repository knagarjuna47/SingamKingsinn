<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Booking - Singam Kings Inn</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">Singam Kings Inn</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#rooms">Rooms</a>
    <a href="index.html#about">About</a>
    <a href="bookings.html">Bookings</a>
    <a href="index.html#contact">Contact</a>
  </nav>
</header>

<section class="booking">
  <h2>Book Your Stay</h2>

  <form id="bookingForm"
        action="https://formsubmit.co/singamkingsinn@gmail.com"
        method="POST">

    <input type="text" id="name" name="name" placeholder="Full Name" required>

    <input type="email" id="email" name="email" placeholder="Email" required>

    <input type="tel" id="phone" name="phone"
           placeholder="Contact Number"
           pattern="[0-9]{10}"
           title="Enter 10 digit mobile number"
           required>

    <!-- CHECK-IN -->
    <label>Check-in Date</label>
    <input type="date" id="checkinDate" name="checkinDate" required>

    <label>Check-in Time</label>
    <select id="checkinTime" name="checkinTime" required>
      <option value="">Select Time</option>
      <option>10:00 AM</option>
      <option>11:00 AM</option>
      <option>12:00 PM</option>
      <option>01:00 PM</option>
      <option>02:00 PM</option>
      <option>03:00 PM</option>
    </select>

    <!-- CHECK-OUT -->
    <label>Check-out Date</label>
    <input type="date" id="checkoutDate" name="checkoutDate" required>

    <label>Check-out Time</label>
    <select id="checkoutTime" name="checkoutTime" required>
      <option value="">Select Time</option>
      <option>09:00 AM</option>
      <option>10:00 AM</option>
      <option>11:00 AM</option>
      <option>12:00 PM</option>
    </select>

    <select id="room" name="room" required>
      <option value="">Select Room Type</option>
      <option>AC Room</option>
      <option>Non AC Room</option>
    </select>

    <!-- Dynamic Email Subject -->
    <input type="hidden" name="_subject" id="emailSubject">

    <input type="hidden" name="_captcha" value="false">

    <input type="hidden" name="_next"
           value="https://knagarjuna47.github.io/SingamKingsinn/thankyou.html">

    <button type="submit">Book Now</button>

  </form>
</section>

<footer>
  <p>© 2024 Singam Kings Inn Hotel. All Rights Reserved.</p>
</footer>

<script>
document.getElementById("bookingForm").addEventListener("submit", function() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let room = document.getElementById("room").value;

  let checkinDate = document.getElementById("checkinDate").value;
  let checkinTime = document.getElementById("checkinTime").value;
  let checkoutDate = document.getElementById("checkoutDate").value;
  let checkoutTime = document.getElementById("checkoutTime").value;

  let checkinFull = checkinDate + " " + checkinTime;
  let checkoutFull = checkoutDate + " " + checkoutTime;

  // Email subject
  document.getElementById("emailSubject").value =
      "Booking enquiry - " + name + " from " + checkinFull;

  // Admin message
  let adminMessage = `New Booking Request:%0A
Name: ${name}%0A
Email: ${email}%0A
Phone: ${phone}%0A
Check-in: ${checkinFull}%0A
Check-out: ${checkoutFull}%0A
Room Type: ${room}`;

  // Customer confirmation message
  let customerMessage = `Dear ${name},%0A
Thank you for choosing Singam Kings Inn.%0A
Your booking from ${checkinFull} to ${checkoutFull} for ${room} has been received.%0A
We will confirm shortly.%0A
Regards,%0A
Singam Kings Inn`;

  let adminNumber = "919550333582";

  // Send to admin
  window.open(`https://wa.me/${adminNumber}?text=${adminMessage}`, "_blank");

  // Send confirmation to customer
  setTimeout(function(){
    window.open(`https://wa.me/91${phone}?text=${customerMessage}`, "_blank");
  }, 2000);

});
</script>

</body>
</html>
